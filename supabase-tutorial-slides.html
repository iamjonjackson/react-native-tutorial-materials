<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supabase + Expo Tutorial · Commit by Commit</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #161b27;
    --surface2: #1e2535;
    --border: #2a3347;
    --accent: #3ecf8e;
    --accent-dim: #1a6648;
    --text: #e2e8f0;
    --text-muted: #8892a4;
    --text-faint: #4a5568;
    --add: #26a641;
    --add-bg: #0d1f0f;
    --rem: #e05c4b;
    --rem-bg: #1f0d0b;
    --note: #f6c90e;
    --note-bg: #1f1a07;
    --tip: #6ea8fe;
    --tip-bg: #0d1929;
    --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, 'Courier New', monospace;
    --sans: 'Inter', system-ui, -apple-system, sans-serif;
    --radius: 8px;
    --slide-count: 12;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
  }

  code {
    font-family: var(--mono);
    font-size: 14px;
    background: rgba(255,255,255,0.05);
    padding: 2px 4px;
    border-radius: 4px;
  }

  /* ─── Shell ─── */
  #shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ─── Header ─── */
  #header {
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 10;
  }

  #header-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    flex: 1;
  }

  #header-title span {
    color: var(--accent);
  }

  /* Progress bar */
  #progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: var(--accent);
    transition: width 0.35s cubic-bezier(.4,0,.2,1);
  }

  /* Commit dots */
  #commit-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .commit-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    border: none;
    padding: 0;
  }
  .commit-dot:hover { background: var(--text-faint); transform: scale(1.3); }
  .commit-dot.active { background: var(--accent); transform: scale(1.25); }
  .commit-dot.visited { background: var(--accent-dim); }

  /* ─── Slide viewport ─── */
  #viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  #slide-track {
    display: flex;
    height: 100%;
    transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    will-change: transform;
  }

  /* ─── Single slide ─── */
  .slide {
    min-width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 32px 40px 80px;
    display: flex;
    flex-direction: column;
    gap: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .slide::-webkit-scrollbar { width: 5px; }
  .slide::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* Slide header */
  .slide-meta {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 6px;
  }

  .slide-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.08em;
  }

  .slide-sha {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    background: rgba(62,207,142,0.08);
    padding: 2px 8px;
    border-radius: 99px;
    text-decoration: none;
    transition: color 0.2s, background 0.2s;
  }
  .slide-sha:hover { color: var(--accent); background: rgba(62,207,142,0.15); }

  .slide-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.25;
    margin-bottom: 20px;
    max-width: 720px;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 24px;
  }

  /* ─── Two-column layout on wide screens ─── */
  .slide-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    flex: 1;
  }

  @media (max-width: 900px) {
    .slide-body { grid-template-columns: 1fr; }
    .slide { padding: 24px 20px 80px; }
    .slide-title { font-size: 19px; }
  }

  .slide-left {}
  .slide-right {}

  /* Explainer */
  .explainer {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 20px;
    max-width: 560px;
  }

  .explainer p + p { margin-top: 12px; }

  /* Notes / callouts */
  .callout {
    border-left: 3px solid;
    padding: 12px 16px;
    border-radius: 0 var(--radius) var(--radius) 0;
    margin-bottom: 16px;
    font-size: 13.5px;
    line-height: 1.6;
  }
  .callout-note { border-color: var(--note); background: var(--note-bg); color: #e8d980; }
  .callout-tip  { border-color: var(--tip);  background: var(--tip-bg);  color: #9dbfff; }
  .callout-warn { border-color: var(--rem);  background: var(--rem-bg);  color: #f08070; }
  .callout-check { border-color: var(--accent); background: var(--add-bg); color: #7ee8b8; }

  .callout strong { font-weight: 700; margin: 5px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.7; }

  .callout ul, .callout ol {
    padding-left: 18px;
    margin-top: 6px;
  }
  .callout li { margin-top: 4px; }

  /* ─── Diff block ─── */
  .diff-wrap {
    background: #0a0d14;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.55;
  }

  .diff-file-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .diff-file-header::before {
    content: '📄';
    font-size: 12px;
  }

  .diff-body {
    overflow-x: auto;
    max-height: 420px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .diff-body::-webkit-scrollbar { height: 4px; width: 4px; }
  .diff-body::-webkit-scrollbar-thumb { background: var(--border); }

  .diff-line {
    display: flex;
    white-space: pre;
    min-height: 20px;
  }

  .diff-gutter {
    min-width: 36px;
    padding: 0 8px;
    text-align: right;
    color: var(--text-faint);
    user-select: none;
    font-size: 11px;
    line-height: 20px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
  }

  .diff-content {
    padding: 0 12px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 20px;
  }

  .diff-line.add    { background: rgba(38,166,65,0.12); }
  .diff-line.add .diff-content { color: #7ee8a2; }
  .diff-line.add .diff-gutter  { color: #26a641; background: rgba(38,166,65,0.08); }

  .diff-line.rem    { background: rgba(224,92,75,0.12); }
  .diff-line.rem .diff-content { color: #f0907f; }
  .diff-line.rem .diff-gutter  { color: var(--rem); background: rgba(224,92,75,0.08); }

  .diff-line.hunk   { background: rgba(110,168,254,0.07); }
  .diff-line.hunk .diff-content { color: #6ea8fe; }
  .diff-line.hunk .diff-gutter  { color: #4a76b8; }

  /* Code snippet (non-diff) */
  .code-block {
    background: #0a0d14;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.6;
    overflow-x: auto;
    color: var(--text);
    margin-bottom: 16px;
    white-space: pre;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* ─── Footer / nav ─── */
  #nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(15,17,23,0.98) 60%, transparent);
    padding: 16px 40px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
    pointer-events: none;
  }

  .nav-btn {
    pointer-events: all;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 10px 20px;
    font-size: 14px;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, opacity 0.15s;
    user-select: none;
  }
  .nav-btn:hover:not(:disabled) { background: #252e42; border-color: #3a4a65; }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }

  .nav-btn .arrow { font-size: 18px; line-height: 1; }
  .nav-btn .label { font-size: 12px; color: var(--text-muted); display: block; line-height: 1; margin-top: 2px; }

  #nav-center {
    pointer-events: all;
    text-align: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
  }

  #nav-center strong {
    display: block;
    font-size: 14px;
    color: var(--text-muted);
    font-family: var(--sans);
    margin-bottom: 2px;
  }

  /* ─── Touch / swipe hint ─── */
  .swipe-hint {
    display: none;
    font-size: 11px;
    color: var(--text-faint);
    text-align: center;
    margin-top: 4px;
  }
  @media (pointer: coarse) { .swipe-hint { display: block; } }

</style>
</head>
<body>

<div id="shell">
  <!-- Header -->
  <div id="header">
    <div id="header-title">
      Supabase + Expo &nbsp;·&nbsp; <span>Commit-by-commit walkthrough</span>
    </div>
    <div id="commit-dots"></div>
    <div id="progress-bar"></div>
  </div>

  <!-- Slide viewport -->

  </div>
</div>

<!-- Bottom nav -->
<div id="nav">
  <button class="nav-btn" id="btn-prev" disabled>
    <span class="arrow">←</span>
    <div>
      <span>Previous</span>
      <span class="label" id="prev-label"></span>
    </div>
  </button>

  <div id="nav-center">
    <strong id="nav-slide-num">1 / 12</strong>
    ← → arrow keys &nbsp;·&nbsp; swipe
    <div class="swipe-hint">Swipe left / right</div>
  </div>

  <button class="nav-btn" id="btn-next">
    <div style="text-align:right">
      <span>Next</span>
      <span class="label" id="next-label"></span>
    </div>
    <span class="arrow">→</span>
  </button>
</div>

<script>
// ─── Slide data ──────────────────────────────────────────────────────────────

const slides = [

    explainer: `<p>Before writing any Supabase code, the two core packages need to be installed. Use the following command:<br /><br /><code>npx expo install @supabase/supabase-js @react-native-async-storage/async-storage</code></p>

  // ── 2 ──────────────────────────────────────────────────────────────────────
  {

    explainer: `<p>KEY ACTION: Update <code>lib/supabase.ts</code> with the code provided.</p><p><code>lib/supabase.ts</code> is where we setup the Supabase client for the entire app. The key config options are:</p>
<ul style="padding-left:18px;margin-top:8px;line-height:1.8;">

</ul>
<p style="margin-top:12px;">Your <code>.env</code> file needs two variables: <code>EXPO_PUBLIC_SUPABASE_URL</code> and <code>EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY</code>. Get these from your Supabase project's <strong>Settings → API Keys</strong> page.</p>`,

    explainer: `<p>KEY ACTION: Create the style sheet for the app using the code provided.</p><p>All shared styles live in a single <code>StyleSheet</code> object exported from <code>styles/styles.ts</code>. React Native does not use CSS — instead, <code>StyleSheet.create()</code> validates the style objects at startup and improves runtime performance.</p>
<p>Key styles defined here:</p>

<p>Both are async and wrapped in <code>setLoading(true/false)</code> so the buttons are disabled during the network call, preventing duplicate submissions. Errors surface via React Native's <code>Alert.alert()</code>.</p>`,

    explainer: `<p>KEY ACTION: Create the <code>components/Account.tsx</code> file with the code provided.</p><p><code>components/Account.tsx</code> is the main post-login screen. It reads the user's profile from the <code>profiles</code> table and lets them update it.</p>
<p>Two Supabase database operations:</p>
<ul style="padding-left:18px;margin-top:8px;line-height:1.8;">

// ─── Render ──────────────────────────────────────────────────────────────────
let current = 0;
const visited = new Set([0]);

function renderDiff(file) {
  let html = `<div class="diff-wrap">
    <div class="diff-file-header">${escHtml(file.name)}</div>
    <div class="diff-body">`;

  for (const hunk of file.hunks) {
    html += `<div class="diff-line hunk"><div class="diff-gutter">…</div><div class="diff-content">${escHtml(hunk.header)}</div></div>`;
    for (const line of hunk.lines) {
      const cls = line.type === 'add' ? 'add' : line.type === 'rem' ? 'rem' : line.type === 'hunk' ? 'hunk' : '';
      const gutter = line.n !== null ? line.n : '';
      html += `<div class="diff-line ${cls}"><div class="diff-gutter">${gutter}</div><div class="diff-content">${escHtml(line.text)}</div></div>`;
    }
  }

  html += `</div></div>`;
  return html;
}

function renderCallout(note) {
  return `<div class="callout callout-${note.type}"><strong>${note.heading}</strong>${note.body}</div>`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildSlides() {
  const track = document.getElementById('slide-track');
  const dotsContainer = document.getElementById('commit-dots');

  slides.forEach((s, i) => {
    // Dot
    const dot = document.createElement('button');
    dot.className = 'commit-dot' + (i === 0 ? ' active' : '');
    dot.title = `${i+1}. ${s.title}`;
    dot.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(dot);

    // Slide
    const slide = document.createElement('div');
    slide.className = 'slide';

    let calloutsHtml = (s.notes || []).map(renderCallout).join('');
    let diffsHtml = (s.files || []).map(renderDiff).join('<div style="height:16px"></div>');

    slide.innerHTML = `
      <div class="slide-meta">
        <span class="slide-num">Commit ${i+1} of ${slides.length}</span>
        <a class="slide-sha" href="${REPO}${s.shaFull}" target="_blank" rel="noopener">${s.sha}</a>
      </div>
      <h2 class="slide-title">${escHtml(s.title)}</h2>
      <div class="divider"></div>
      <div class="slide-body">
        <div class="slide-left">
          <div class="explainer">${s.explainer}</div>
          ${calloutsHtml}
        </div>
        <div class="slide-right">
          <h2 style="margin-bottom: 10px;">Sample Code Snippet</h2><p style="margin-bottom: 20px;">Grab full code from the commit link: <a class="slide-sha" href="${REPO}${s.shaFull}" target="_blank" rel="noopener">${s.sha}</a></p>
          ${diffsHtml}
        </div>
      </div>`;

    track.appendChild(slide);
  });
}

function updateUI() {
  const total = slides.length;
  const pct = ((current + 1) / total * 100).toFixed(1);

  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('nav-slide-num').textContent = `${current + 1} / ${total}`;

  // Dots
  document.querySelectorAll('.commit-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === current);
    dot.classList.toggle('visited', visited.has(i) && i !== current);
  });

  // Buttons
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  prev.disabled = current === 0;
  next.disabled = current === total - 1;

  const prevLabel = document.getElementById('prev-label');
  const nextLabel = document.getElementById('next-label');
  if (current > 0) prevLabel.textContent = `#${current}`;
  else prevLabel.textContent = '';
  if (current < total - 1) nextLabel.textContent = `#${current + 2}`;
  else nextLabel.textContent = '';

  // Track position
  document.getElementById('slide-track').style.transform = `translateX(-${current * 100}%)`;

  // Scroll slide to top
  const slides_el = document.querySelectorAll('.slide');
  if (slides_el[current]) slides_el[current].scrollTop = 0;
}

function goTo(idx) {
  if (idx < 0 || idx >= slides.length) return;
  current = idx;
  visited.add(current);
  updateUI();
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); goTo(current + 1); }
  if (e.key === 'ArrowLeft'  || e.key === 'PageUp')   { e.preventDefault(); goTo(current - 1); }
});

// Buttons
document.getElementById('btn-prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(current + 1));

// Touch / swipe
let touchStartX = 0;
let touchStartY = 0;
const viewport = document.getElementById('viewport');

viewport.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

viewport.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) goTo(current + 1);
    else goTo(current - 1);
  }
}, { passive: true });

// Init
buildSlides();
updateUI();
</script>
</body>
</html>
